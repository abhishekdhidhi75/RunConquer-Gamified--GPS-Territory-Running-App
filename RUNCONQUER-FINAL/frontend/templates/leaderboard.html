<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — RunConquer</title>
  <meta name="description" content="Global leaderboard — see who's conquered the most territory.">
  <link rel="stylesheet" href="/static/css/globals.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">🏃</span>
      <span>RUNCONQUER</span>
    </a>
    <ul class="navbar-nav" id="nav-items">
      <li><a href="/map" class="nav-link"><span>Map</span></a></li>
      <li><a href="/dashboard" class="nav-link"><span>Dashboard</span></a></li>
      <li><a href="/leaderboard" class="nav-link active"><span>Leaderboard</span></a></li>
      <li id="nav-auth-btn">
        <a href="/login" class="btn btn-primary btn-sm">Get Started</a>
      </li>
      <li id="nav-user-info" class="hidden">
        <a href="/dashboard" class="nav-user">
          <div class="nav-avatar" id="nav-avatar" style="background: var(--accent-primary);">?</div>
          <span id="nav-username">User</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="leaderboard-page container">
    <div class="leaderboard-header animate-in">
      <h1><span class="text-gradient">Global Leaderboard</span></h1>
      <p>Ranked by total territory area conquered</p>
    </div>

    <!-- Top 3 Podium -->
    <div class="podium animate-in animate-in-delay-1" id="podium">
      <!-- Filled by JS -->
    </div>

    <!-- Full Table -->
    <div class="glass-card-static animate-in animate-in-delay-2" style="overflow-x: auto;">
      <table class="leaderboard-table" id="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Runner</th>
            <th>Rank</th>
            <th>Level</th>
            <th>Area</th>
            <th>Distance</th>
            <th>Runs</th>
            <th>Streak</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr>
            <td colspan="8">
              <div class="loading-screen" style="min-height: 200px;">
                <div class="spinner"></div>
                <span>Loading leaderboard...</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    initApp();

    async function loadLeaderboard() {
      try {
        const data = await apiGet('/api/leaderboard/global');

        if (!data || data.length === 0) {
          document.getElementById('podium').innerHTML = `
            <div style="text-align: center; padding: 40px; color: var(--text-muted); width: 100%;">
              <div style="font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5;">🏆</div>
              <p style="font-size: 0.9rem;">No runners yet. Be the first to conquer territory!</p>
              <a href="/register" class="btn btn-primary" style="margin-top: 16px;">Join Now</a>
            </div>
          `;
          document.getElementById('leaderboard-body').innerHTML = `
            <tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--text-muted);">No data yet</td></tr>
          `;
          return;
        }

        // Render podium (top 3)
        renderPodium(data.slice(0, 3));

        // Render table
        renderTable(data);

      } catch (err) {
        console.error('Leaderboard error:', err);
        document.getElementById('leaderboard-body').innerHTML = `
          <tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--text-muted);">Failed to load leaderboard</td></tr>
        `;
      }
    }

    function renderPodium(top3) {
      const podium = document.getElementById('podium');
      const medals = ['🥇', '🥈', '🥉'];
      const classes = ['first', 'second', 'third'];

      podium.innerHTML = top3.map((p, i) => `
        <div class="podium-place ${classes[i]}">
          <div class="podium-rank">${medals[i]}</div>
          <div style="width: 44px; height: 44px; border-radius: 50%; background: ${p.avatar_color}; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; color: var(--bg-primary);">
            ${p.username[0].toUpperCase()}
          </div>
          <div class="podium-name">${p.username}</div>
          <div class="rank-badge rank-${p.rank.toLowerCase()}" style="margin: 6px auto;">
            ${p.rank_icon} ${p.rank}
          </div>
          <div class="podium-area">${p.total_area_display}</div>
          <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 4px;">
            ${p.total_runs} runs · ${p.total_distance_km} km
          </div>
        </div>
      `).join('');

      // Pad if less than 3
      while (podium.children.length < 3) {
        podium.innerHTML += `<div class="podium-place" style="opacity: 0.2;">
          <div class="podium-rank">—</div>
          <div class="podium-name">Empty</div>
        </div>`;
      }
    }

    function renderTable(data) {
      const body = document.getElementById('leaderboard-body');
      body.innerHTML = data.map(p => {
        let posBadge = `<span class="position-badge">${p.position}</span>`;
        if (p.position <= 3) {
          posBadge = `<span class="position-badge position-${p.position}">${p.position}</span>`;
        }

        return `
          <tr>
            <td>${posBadge}</td>
            <td>
              <div class="flex items-center gap-1">
                <div style="width: 30px; height: 30px; border-radius: 50%; background: ${p.avatar_color}; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; color: var(--bg-primary); flex-shrink: 0;">
                  ${p.username[0].toUpperCase()}
                </div>
                <strong style="font-size: 0.875rem;">${p.username}</strong>
              </div>
            </td>
            <td><span class="rank-badge rank-${p.rank.toLowerCase()}">${p.rank_icon} ${p.rank}</span></td>
            <td>${p.level}</td>
            <td style="color: var(--accent-primary); font-weight: 600;">${p.total_area_display}</td>
            <td>${p.total_distance_km} km</td>
            <td>${p.total_runs}</td>
            <td>${p.streak_days > 0 ? '🔥 ' + p.streak_days : '—'}</td>
          </tr>
        `;
      }).join('');
    }

    loadLeaderboard();
  </script>
</body>
</html>
