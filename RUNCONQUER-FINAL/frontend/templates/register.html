<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — RunConquer</title>
  <meta name="description" content="Create your RunConquer account and start conquering territory.">
  <link rel="stylesheet" href="/static/css/globals.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">🏃</span>
      <span>RUNCONQUER</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="/" class="nav-link"><span>Home</span></a></li>
      <li><a href="/map" class="nav-link"><span>Map</span></a></li>
      <li><a href="/leaderboard" class="nav-link"><span>Leaderboard</span></a></li>
      <li><a href="/login" class="btn btn-primary btn-sm">Login</a></li>
    </ul>
  </nav>

  <div class="auth-page">
    <div class="glass-card-static auth-card animate-in">
      <h1><span class="text-gradient">Join the Conquest</span></h1>
      
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <input class="form-input" type="text" id="reg-username" placeholder="Choose a username" required minlength="3" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <div id="register-error" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary" id="register-btn" style="width: 100%; margin-top: 8px;">
          Create Account
        </button>
      </form>

      <div class="auth-divider">
        Already have an account? <a href="/login">Login</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    if (getToken()) window.location.href = '/dashboard';

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errorEl = document.getElementById('register-error');
      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const data = await apiPost('/api/auth/register', {
          username: document.getElementById('reg-username').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value
        });
        localStorage.setItem('rc_token', data.access_token);
        localStorage.setItem('rc_user', JSON.stringify(data.user));
        showToast('Welcome to RunConquer, ' + data.user.username + '!', 'success');
        setTimeout(() => window.location.href = '/dashboard', 500);
      } catch (err) {
        errorEl.textContent = err.message || 'Registration failed. Please try a different username or email.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
